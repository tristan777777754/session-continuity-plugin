<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Session Continuity concept diagram</title>
  <desc id="desc">A long coding session accumulates tokens and context noise. An explicit handoff preserves verified project state, and a fresh Codex session automatically loads only the useful context for the same project.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="1" stop-color="#111b33"/>
    </linearGradient>
    <linearGradient id="oldSession" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="handoff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="newSession" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1440" height="810" fill="url(#background)"/>
  <circle cx="1280" cy="80" r="260" fill="#7c3aed" opacity="0.07"/>
  <circle cx="120" cy="760" r="300" fill="#0891b2" opacity="0.06"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="720" y="74" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="750" letter-spacing="-1.2">Fresh context. Continuous project.</text>
    <text x="720" y="112" text-anchor="middle" fill="#94a3b8" font-size="19">Keep the useful project state — leave the accumulated conversation noise behind.</text>

    <!-- Long session card -->
    <g filter="url(#shadow)">
      <rect x="72" y="176" width="382" height="430" rx="28" fill="#111a2e" stroke="#fb7185" stroke-opacity="0.55" stroke-width="2"/>
      <rect x="73" y="177" width="380" height="428" rx="27" fill="url(#oldSession)"/>
    </g>
    <circle cx="116" cy="222" r="19" fill="#fb7185" fill-opacity="0.18"/>
    <path d="M107 222h18M116 213v18" stroke="#fb7185" stroke-width="2.5" stroke-linecap="round"/>
    <text x="148" y="218" fill="#f8fafc" font-size="23" font-weight="700">Long coding session</text>
    <text x="148" y="242" fill="#fda4af" font-size="14" font-weight="650" letter-spacing="1.5">CONTEXT KEEPS GROWING</text>

    <rect x="104" y="278" width="318" height="54" rx="13" fill="#172036" stroke="#334155"/>
    <circle cx="128" cy="305" r="7" fill="#34d399"/>
    <text x="148" y="311" fill="#cbd5e1" font-size="17">Useful decisions</text>

    <rect x="104" y="343" width="318" height="54" rx="13" fill="#172036" stroke="#334155"/>
    <circle cx="128" cy="370" r="7" fill="#fb7185"/>
    <text x="148" y="376" fill="#cbd5e1" font-size="17">Old errors and logs</text>

    <rect x="104" y="408" width="318" height="54" rx="13" fill="#172036" stroke="#334155"/>
    <circle cx="128" cy="435" r="7" fill="#f59e0b"/>
    <text x="148" y="441" fill="#cbd5e1" font-size="17">Abandoned approaches</text>

    <rect x="104" y="473" width="318" height="54" rx="13" fill="#172036" stroke="#334155"/>
    <circle cx="128" cy="500" r="7" fill="#a78bfa"/>
    <text x="148" y="506" fill="#cbd5e1" font-size="17">Outdated assumptions</text>

    <text x="104" y="559" fill="#94a3b8" font-size="14" font-weight="650" letter-spacing="1">ACTIVE CONTEXT</text>
    <rect x="104" y="572" width="318" height="9" rx="4.5" fill="#263247"/>
    <rect x="104" y="572" width="288" height="9" rx="4.5" fill="#fb7185"/>
    <text x="404" y="559" text-anchor="end" fill="#fda4af" font-size="14" font-weight="700">More tokens · More noise</text>

    <!-- Handoff card -->
    <g filter="url(#shadow)">
      <rect x="530" y="226" width="380" height="330" rx="28" fill="#111a2e" stroke="#a78bfa" stroke-opacity="0.70" stroke-width="2"/>
      <rect x="531" y="227" width="378" height="328" rx="27" fill="url(#handoff)"/>
    </g>
    <rect x="562" y="256" width="316" height="45" rx="22.5" fill="#7c3aed" fill-opacity="0.30" stroke="#a78bfa" stroke-opacity="0.60"/>
    <text x="720" y="285" text-anchor="middle" fill="#ddd6fe" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700">$session-handoff</text>
    <text x="720" y="341" text-anchor="middle" fill="#f8fafc" font-size="25" font-weight="750">Explicit, concise handoff</text>
    <text x="720" y="369" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="650" letter-spacing="1.4">KEEP THE SIGNAL</text>

    <g fill="#cbd5e1" font-size="16">
      <circle cx="588" cy="410" r="5" fill="#a78bfa"/>
      <text x="606" y="416">Current objective and constraints</text>
      <circle cx="588" cy="446" r="5" fill="#a78bfa"/>
      <text x="606" y="452">Verified work and decisions</text>
      <circle cx="588" cy="482" r="5" fill="#a78bfa"/>
      <text x="606" y="488">Repository state and next steps</text>
    </g>
    <text x="720" y="529" text-anchor="middle" fill="#94a3b8" font-size="14">Saved locally for this project only</text>

    <!-- Fresh session card -->
    <g filter="url(#shadow)">
      <rect x="986" y="176" width="382" height="430" rx="28" fill="#111a2e" stroke="#22d3ee" stroke-opacity="0.58" stroke-width="2"/>
      <rect x="987" y="177" width="380" height="428" rx="27" fill="url(#newSession)"/>
    </g>
    <circle cx="1030" cy="222" r="19" fill="#22d3ee" fill-opacity="0.18"/>
    <path d="M1020 222h20M1030 212v20" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <text x="1062" y="218" fill="#f8fafc" font-size="23" font-weight="700">Fresh Codex session</text>
    <text x="1062" y="242" fill="#67e8f9" font-size="14" font-weight="650" letter-spacing="1.5">CLEAN, FOCUSED CONTEXT</text>

    <rect x="1018" y="278" width="318" height="146" rx="18" fill="#0f2030" stroke="#22d3ee" stroke-opacity="0.32"/>
    <path d="M1052 314h25v32h-25z M1058 308h25v32" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
    <text x="1100" y="319" fill="#f8fafc" font-size="18" font-weight="700">Automatic load</text>
    <text x="1100" y="346" fill="#94a3b8" font-size="15">The handoff arrives when a</text>
    <text x="1100" y="369" fill="#94a3b8" font-size="15">new session starts in the</text>
    <text x="1100" y="392" fill="#94a3b8" font-size="15">same project.</text>

    <rect x="1018" y="447" width="318" height="56" rx="14" fill="#172036" stroke="#334155"/>
    <circle cx="1045" cy="475" r="7" fill="#34d399"/>
    <text x="1065" y="481" fill="#cbd5e1" font-size="17">Useful state restored</text>

    <rect x="1018" y="515" width="318" height="56" rx="14" fill="#172036" stroke="#334155"/>
    <circle cx="1045" cy="543" r="7" fill="#22d3ee"/>
    <text x="1065" y="549" fill="#cbd5e1" font-size="17">Conversation noise removed</text>

    <!-- Flow arrows -->
    <path d="M454 391 C488 391 494 391 522 391" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
    <text x="492" y="373" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">SAVE</text>
    <path d="M910 391 C944 391 950 391 978 391" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
    <text x="948" y="373" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">LOAD</text>

    <!-- Safety rail -->
    <rect x="172" y="660" width="1096" height="78" rx="22" fill="#0d1728" stroke="#334155"/>
    <g font-size="15.5" font-weight="650">
      <circle cx="238" cy="699" r="14" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee"/>
      <path d="M232 699l4 4 8-9" fill="none" stroke="#67e8f9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="262" y="705" fill="#cbd5e1">Same-project isolation</text>

      <circle cx="540" cy="699" r="14" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa"/>
      <path d="M534 699l4 4 8-9" fill="none" stroke="#c4b5fd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="564" y="705" fill="#cbd5e1">Local and network-free</text>

      <circle cx="864" cy="699" r="14" fill="#34d399" fill-opacity="0.15" stroke="#34d399"/>
      <path d="M858 699l4 4 8-9" fill="none" stroke="#6ee7b7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="888" y="705" fill="#cbd5e1">Historical context, never instructions</text>
    </g>

    <text x="720" y="779" text-anchor="middle" fill="#64748b" font-size="14" letter-spacing="0.5">SESSION CONTINUITY FOR CODEX</text>
  </g>
</svg>
